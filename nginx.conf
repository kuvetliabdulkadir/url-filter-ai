server {
    listen 80;
    server_name url.kuvetliabdulkadir.com;

    # https'e yonlendir (certbot ekledikten sonra aktif olacak)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # guvenlik headerlari
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self';" always;

        # guvenlik: sunucu bilgisini gizle
        proxy_hide_header X-Powered-By;
    }

    # guvenlik: hassas dosyalara erisimi engelle
    location ~ /\. { deny all; }
    location ~ \.(env|git|py|pyc)$ { deny all; }
    }

    }
}